<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <!-- Linking CSS file -->
    <link href="stylesheet.css" rel="stylesheet" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Karla:ital,wght@0,200..800;1,200..800&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Outfit:wght@100..900&family=Sofia+Sans:ital,wght@0,1..1000;1,1..1000&display=swap"
      rel="stylesheet"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Contact form</title>
  </head>

  <body>
    <form>
      <h2 class="page-title">Contact Us</h2>

      <div class="name-container">
        <div class="name">
          <label for="first-name">First Name <span>*</span></label>
          <input type="text" name="first-name" id="first-name" required />
          <!-- This field is required -->
        </div>

        <div class="name">
          <label for="last-name">Last Name <span>*</span></label>
          <input type="text" name="last-name" id="last-name" required />
          <!-- This field is required -->
        </div>
      </div>

      <div class="email">
        <label for="email">Email Address <span>*</span></label>
        <input type="email" name="email" id="email" required />
        <!-- Please enter a valid email address -->
        <!-- This field is required -->
      </div>

      <div class="query">
        <label for="query">Query Type <span>*</span></label>

        <div class="query-cont">
          <label>
            <input type="radio" name="query" />
            <span>General Enquiry</span>
          </label>

          <label>
            <input type="radio" name="query" />
            <span>General Enquiry</span>
          </label>
        </div>
      </div>

      <div class="msg-container">
        <label> Message <span>*</span></label>
        <!-- <input type="text"> -->
        <textarea rows="3"></textarea>
        <!-- This field is required -->
      </div>

      <div class="terms">
        <label for="terms">
          <input type="checkbox" id="terms" name="terms" /> I consent to being
          contacted by the team <span>*</span>
        </label>
      </div>
      <!-- To submit this form, please consent to being contacted -->
      <button>Submit</button>
      <!-- <div>
      Message Sent!
      Thanks for completing the form. We'll be in touch soon!
    </div> -->
    </form>

    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by
      <a href="https://github.com/Princesg-1506">Mastersolution Tech</a>.
    </div>
    
  </body>
</html>
